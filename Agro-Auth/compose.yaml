services:
  postgres:
    image: 'postgres:16'
    environment:
      POSTGRES_DB: agro_auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456789
    ports:
      - '5432:5432'
    volumes:
      - pgdata_auth:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d agro_auth_db']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata_auth: