spring:
  application:
    name: Agro-Auth

  datasource:
    url: jdbc:postgresql://localhost:5432/agro_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:123456789}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: fvsdfsd
  expiration: dfgsrtgtr
