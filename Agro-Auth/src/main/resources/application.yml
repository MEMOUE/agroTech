spring:
  application:
    name: Agro-Auth
  datasource:
    url: jdbc:postgresql://localhost:5432/agro_auth_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:123456789}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8081

jwt:
  secret: ${JWT_SECRET:VotreCleSecreteTresLongueEtSecuriseeAuMoins32Caracteres!}
  expiration: 86400000  # 24 heures en millisecondes

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html