<div class="min-h-screen bg-white flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <!-- Logo / Brand -->
    <div class="text-center mb-8">
      <img src="logo.png" alt="AgroTech" class="h-20 w-auto mx-auto mb-4" style="filter: drop-shadow(0 2px 8px rgba(0,0,0,0.15));" />

      <p class="text-gray-500 mt-1">Connectez-vous à votre espace</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-xl p-8">
      @if (error()) {
        <div class="mb-4 px-4 py-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm">
          {{ error() }}
        </div>
      }

      <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
        <!-- Username / Téléphone / Email -->
        <div class="mb-5">
          <label class="block text-sm font-medium text-gray-700 mb-1.5" for="username">
            Nom d'utilisateur ou téléphone
          </label>
          <input
            id="username"
            type="text"
            formControlName="username"
            autocomplete="username"
            placeholder="ex: Mamadou  ou  +237691234567"
            class="w-full px-4 py-2.5 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-500 transition"
            [class.border-red-400]="form.controls.username.invalid && form.controls.username.touched"
            [class.border-gray-300]="!(form.controls.username.invalid && form.controls.username.touched)"
          />
          @if (form.controls.username.invalid && form.controls.username.touched) {
            <p class="mt-1 text-xs text-red-500">Ce champ est requis.</p>
          }
        </div>

        <!-- Password -->
        <div class="mb-6">
          <label class="block text-sm font-medium text-gray-700 mb-1.5" for="password">
            Mot de passe
          </label>
          <div class="relative">
            <input
              id="password"
              [type]="showPassword() ? 'text' : 'password'"
              formControlName="password"
              autocomplete="current-password"
              placeholder="••••••••"
              class="w-full px-4 py-2.5 border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-500 transition pr-11"
              [class.border-red-400]="form.controls.password.invalid && form.controls.password.touched"
              [class.border-gray-300]="!(form.controls.password.invalid && form.controls.password.touched)"
            />
            <button type="button" (click)="showPassword.set(!showPassword())"
              class="absolute inset-y-0 right-0 px-3 flex items-center text-gray-400 hover:text-gray-600">
              @if (showPassword()) {
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
                </svg>
              } @else {
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                </svg>
              }
            </button>
          </div>
          @if (form.controls.password.invalid && form.controls.password.touched) {
            <p class="mt-1 text-xs text-red-500">Ce champ est requis.</p>
          }
        </div>

        <!-- Submit -->
        <button
          type="submit"
          [disabled]="loading()"
          class="w-full py-2.5 px-4 bg-green-600 hover:bg-green-700 disabled:opacity-60 text-white font-semibold rounded-lg transition focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-offset-2">
          @if (loading()) {
            <span class="inline-flex items-center gap-2">
              <svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
              </svg>
              Connexion…
            </span>
          } @else {
            Se connecter
          }
        </button>
      </form>

      <p class="mt-6 text-center text-sm text-gray-500">
        Pas encore de compte ?
        <a routerLink="/register" class="text-green-600 font-medium hover:underline">Créer un compte</a>
      </p>
    </div>
  </div>
</div>
