services:
  postgres:
    image: 'postgres:16'
    environment:
      POSTGRES_DB: agro_parcelles_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456789
    ports:
      - '5433:5432'
    volumes:
      - pgdata_parcelles:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d agro_parcelles_db']
      interval: 10s
      timeout: 5s
      retries: 5

  agro-parcelles:
    build: .
    ports:
      - '8082:8082'
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/agro_parcelles_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 123456789
      AUTH_SERVICE_URL: http://host.docker.internal:8081
      SENTINEL_SERVICE_URL: http://sentinel-service:8000
    depends_on:
      postgres:
        condition: service_healthy
      sentinel-service:
        condition: service_started

  sentinel-service:
    build: ./sentinel-service
    ports:
      - '8000:8000'
    environment:
      GEE_PROJECT: ${GEE_PROJECT:-}
      GEE_SERVICE_ACCOUNT: ${GEE_SERVICE_ACCOUNT:-}
      GEE_PRIVATE_KEY_FILE: /secrets/gee-key.json
    volumes:
      # Déposez la clé du compte de service ici (montée en lecture seule).
      - ./sentinel-service/secrets:/secrets:ro

volumes:
  pgdata_parcelles: